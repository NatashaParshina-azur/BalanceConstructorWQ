# Serverless functions (Google Sheets CSV proxy lives here)
[functions]
  directory = "netlify/functions"

# Serve constructor.html at the site root (Netlify looks for index.html by default).
# status = 200 → rewrite: the URL stays "/", but the content of constructor.html is served.
[[redirects]]
  from = "/"
  to = "/constructor.html"
  status = 200
